<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WA Preview — For You, Always</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden; /* Prevent scrollbars */
      margin: 0;
    }

    /* ── Canvas wrapper for scaling ── */
    #scale-wrapper {
      position: relative;
    }

    /* ── Canvas shell ── */
    #wa-canvas {
      width: 390px;
      height: 844px;
      background-color: #111B21;
      position: absolute;
      top: 0;
      left: 0;
      overflow: hidden;
      border-radius: 20px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.9);
      transform-origin: top left;
      transition: transform 0.45s cubic-bezier(0.25, 1, 0.5, 1), transform-origin 0.45s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* ── Countdown overlay ── */
    #countdown-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 16px;
    }
    #countdown-overlay.hidden { display: none; }
    #countdown-num {
      font-size: 96px;
      font-weight: 800;
      color: #00A884;
      line-height: 1;
      animation: pulse 1s ease-in-out infinite;
    }
    #countdown-label {
      font-size: 14px;
      color: #8696A0;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    /* ── Typing dots ── */
    @keyframes tdot {
      0%,60%,100% { transform: translateY(0); opacity: .35; }
      30%          { transform: translateY(-5px); opacity: 1; }
    }
    .t-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #8696A0; display: inline-block;
      animation: tdot 1.2s ease-in-out infinite;
    }

    /* ── WA BG pattern ── (hidden – bg applied directly to wa-chat-area) */
    #wa-bg-pattern { display: none; }

    /* ── Chat area background static in place ── */
    #wa-chat-area {
      background-image: url('assets/wa-pattern.svg');
      background-repeat: repeat;
      background-size: 400px;
      background-position: center top;
      background-attachment: scroll;
    }

    /* ── Message slide-in animation ── */
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-15px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(15px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .msg-enter-in {
      animation: slideInLeft 0.3s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
    }
    .msg-enter-out {
      animation: slideInRight 0.3s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
    }

    /* ── Replay button ── */
    #btn-replay {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #00A884;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: none;
      gap: 6px;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,168,132,0.4);
      transition: background 0.2s;
      font-family: inherit;
    }
    #btn-replay:hover { background: #06cf9c; }

    /* ── Error state ── */
    #error-msg {
      color: #ff6b6b;
      font-size: 14px;
      text-align: center;
      padding: 24px;
    }
  </style>
</head>
<body>

<!-- Countdown overlay -->
<div id="countdown-overlay">
  <button id="btn-start" onclick="initAnimation()" 
          style="background:#00A884; color:white; border:none; padding:12px 24px; border-radius:30px; font-size:16px; font-weight:600; cursor:pointer; font-family:inherit; box-shadow:0 8px 24px rgba(0,168,132,0.4);">
    ▶ Start Animation
  </button>
  <div id="countdown-num" style="display:none;">3</div>
  <div id="countdown-label" style="display:none;">Starting animation…</div>
</div>

<!-- Replay button -->
<button id="btn-replay" onclick="startAnimation()">
  ↺ Replay
</button>

<!-- Scale wrapper -->
<div id="scale-wrapper">

<!-- WA Canvas -->
<div id="wa-canvas">

  <!-- STATUS BAR -->
  <div id="wa-status-bar" style="display:flex; align-items:center; justify-content:space-between;
              padding:10px 20px 6px; background:#202C33;">
    <span id="wa-time" style="font-size:13px; font-weight:600; color:#E9EDEF;">9:41</span>
    <div style="display:flex; align-items:center; gap:6px;">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="#E9EDEF">
        <rect x="0" y="8" width="3" height="4" rx="0.5"/>
        <rect x="4.5" y="5" width="3" height="7" rx="0.5"/>
        <rect x="9" y="2" width="3" height="10" rx="0.5"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.5" opacity="0.35"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 20 15" fill="none" stroke="#E9EDEF" stroke-width="1.8" stroke-linecap="round">
        <path d="M1 5.5C4.5 2 9.5 1 14 3.5"/>
        <path d="M3.5 8.5C5.8 6 9 5.3 12 7"/>
        <circle cx="10" cy="12.5" r="1.5" fill="#E9EDEF"/>
      </svg>
      <div style="display:flex; align-items:center; gap:1px;">
        <div style="width:22px; height:11px; border:1.5px solid #E9EDEF; border-radius:3px;
                    position:relative; padding:1.5px;">
          <div style="position:absolute; inset:1.5px; width:80%; background:#E9EDEF; border-radius:1px;"></div>
        </div>
        <div style="width:2px; height:5px; background:#E9EDEF; opacity:0.5; border-radius:0 1px 1px 0;"></div>
      </div>
    </div>
  </div>

  <!-- WA HEADER — TABLE LAYOUT -->
  <table id="wa-header"
         style="width:100%; height:62px; border-collapse:collapse; table-layout:fixed;
                background:#202C33; border-bottom:1px solid #1D282F;">
    <colgroup>
      <col style="width:40px" />
      <col style="width:56px" />
      <col /><!-- name: remaining = 198px -->
      <col style="width:96px" />
    </colgroup>
    <tr>
      <!-- Back arrow -->
      <td style="padding:0; text-align:center; vertical-align:middle; color:#AEBAC1;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
      </td>
      <!-- PFP -->
      <td style="padding:0; text-align:center; vertical-align:middle;">
        <div style="position:relative; width:44px; height:44px; display:inline-block;">
          <img id="wa-pfp" src=""
               style="width:44px; height:44px; border-radius:50%; object-fit:cover;
                      border:2px solid #00A884; display:block;"
               onerror="this.style.display='none'; document.getElementById('wa-pfp-fallback').style.display='flex';" />
          <div id="wa-pfp-fallback"
               style="width:44px; height:44px; border-radius:50%; background:#00A884;
                      align-items:center; justify-content:center;
                      position:absolute; top:0; left:0; display:none;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
          </div>
          <span style="position:absolute; bottom:0; right:0; width:12px; height:12px;
                       border-radius:50%; background:#00A884; border:2px solid #202C33;"></span>
        </div>
      </td>
      <!-- Name + status -->
      <td style="padding:0 6px 0 4px; vertical-align:middle;">
        <p id="wa-name"
           style="font-size:15px; font-weight:600; color:#E9EDEF;
                  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
                  line-height:1.3; margin:0; padding:0;">Contact Name</p>
        <p id="wa-status-text" style="font-size:12px; color:#00A884; margin:0; padding:0; line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">online</p>
      </td>
      <!-- Icons -->
      <td style="padding:0 10px 0 0; vertical-align:middle;">
        <div style="display:flex; align-items:center; justify-content:flex-end;
                    gap:10px; color:#AEBAC1;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
          </svg>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
          </svg>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
          </svg>
        </div>
      </td>
    </tr>
  </table>

  <!-- CHAT AREA -->
  <div id="wa-chat-area"
       style="position:relative; height:690px; overflow-y:auto; overflow-x:hidden;
              background-color:#111B21; padding:4px 8px 10px;">

    <!-- BG pattern (hidden – bg applied directly on wa-chat-area via JS) -->
    <div id="wa-bg-pattern" style="display:none;"></div>

    <!-- Date separator -->
    <div style="position:relative; z-index:1; display:flex; justify-content:center;
                width:100%; margin-bottom:8px;">
      <span style="font-size:11.5px; padding:4px 14px; border-radius:999px;
                   background:#1D282F; color:#8696A0; white-space:nowrap;">TODAY</span>
    </div>

    <!-- Messages container -->
    <div id="wa-messages" style="position:relative; z-index:1; width:100%;"></div>

    <!-- Typing indicator -->
    <div id="wa-typing"
         style="position:relative; z-index:1; display:none;
                padding:0 8px 6px; width:100%;">
      <div style="background:#202C33; border-radius:0 12px 12px 12px;
                  padding:10px 14px; width:fit-content; display:inline-block;">
        <div style="display:flex; gap:5px; align-items:center; height:14px;">
          <span class="t-dot"></span>
          <span class="t-dot" style="animation-delay:0.16s"></span>
          <span class="t-dot" style="animation-delay:0.32s"></span>
        </div>
      </div>
    </div>

  </div><!-- end chat area -->

  <!-- INPUT BAR -->
  <div style="position:absolute; bottom:0; left:0; right:0;
              display:flex; align-items:center; gap:8px;
              padding:8px 12px; background:#202C33;">
    <div style="color:#AEBAC1;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
        <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
      </svg>
    </div>
    <div style="flex:1; background:#2A3942; border-radius:999px; padding:8px 16px;
                font-size:13px; color:#8696A0;">Message</div>
    <div style="width:40px; height:40px; background:#00A884; border-radius:50%;
                display:flex; align-items:center; justify-content:center; flex-shrink:0;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </div>
  </div>

</div><!-- end #wa-canvas -->
</div><!-- end #scale-wrapper -->

<script src="js/modules/groupChat.js"></script>
<script src="js/modules/statusBarCustom.js"></script>
<script src="js/modules/voiceNote.js"></script>
<script src="js/modules/transferCard.js"></script>
<script src="js/modules/typingIndicator.js"></script>
<script src="js/modules/deletedMessage.js"></script>
<script src="js/modules/pinnedBanner.js"></script>
<script src="js/modules/locationCard.js"></script>
<script src="js/modules/lastSeen.js"></script>
<script src="js/modules/viewOnce.js"></script>
<script src="js/modules/documentCard.js"></script>
<script src="js/modules/callCards.js"></script>
<script src="js/modules/statusReply.js"></script>
<script src="js/modules/unreadBadge.js"></script>
<script src="preview.js"></script>
</body>
</html>
