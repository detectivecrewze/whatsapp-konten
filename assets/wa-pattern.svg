<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <style>
      .line { stroke: #8696A0; stroke-width: 0.5; fill: none; opacity: 0.15; }
    </style>
  </defs>

  <!-- Subtle diagonal grid pattern resembling WhatsApp's chat background -->
  <!-- Horizontal lines -->
  <line class="line" x1="0" y1="20"  x2="400" y2="20"/>
  <line class="line" x1="0" y1="60"  x2="400" y2="60"/>
  <line class="line" x1="0" y1="100" x2="400" y2="100"/>
  <line class="line" x1="0" y1="140" x2="400" y2="140"/>
  <line class="line" x1="0" y1="180" x2="400" y2="180"/>
  <line class="line" x1="0" y1="220" x2="400" y2="220"/>
  <line class="line" x1="0" y1="260" x2="400" y2="260"/>
  <line class="line" x1="0" y1="300" x2="400" y2="300"/>
  <line class="line" x1="0" y1="340" x2="400" y2="340"/>
  <line class="line" x1="0" y1="380" x2="400" y2="380"/>

  <!-- Diagonal lines (top-left to bottom-right) -->
  <line class="line" x1="0"   y1="0"   x2="400" y2="400"/>
  <line class="line" x1="0"   y1="80"  x2="320" y2="400"/>
  <line class="line" x1="0"   y1="160" x2="240" y2="400"/>
  <line class="line" x1="0"   y1="240" x2="160" y2="400"/>
  <line class="line" x1="0"   y1="320" x2="80"  y2="400"/>
  <line class="line" x1="80"  y1="0"   x2="400" y2="320"/>
  <line class="line" x1="160" y1="0"   x2="400" y2="240"/>
  <line class="line" x1="240" y1="0"   x2="400" y2="160"/>
  <line class="line" x1="320" y1="0"   x2="400" y2="80"/>

  <!-- Small diamond dots at intersections -->
  <g fill="#8696A0" opacity="0.1">
    <rect x="39"  y="39"  width="2" height="2" transform="rotate(45 40 40)"/>
    <rect x="119" y="39"  width="2" height="2" transform="rotate(45 120 40)"/>
    <rect x="199" y="39"  width="2" height="2" transform="rotate(45 200 40)"/>
    <rect x="279" y="39"  width="2" height="2" transform="rotate(45 280 40)"/>
    <rect x="359" y="39"  width="2" height="2" transform="rotate(45 360 40)"/>

    <rect x="39"  y="119" width="2" height="2" transform="rotate(45 40 120)"/>
    <rect x="119" y="119" width="2" height="2" transform="rotate(45 120 120)"/>
    <rect x="199" y="119" width="2" height="2" transform="rotate(45 200 120)"/>
    <rect x="279" y="119" width="2" height="2" transform="rotate(45 280 120)"/>
    <rect x="359" y="119" width="2" height="2" transform="rotate(45 360 120)"/>

    <rect x="39"  y="199" width="2" height="2" transform="rotate(45 40 200)"/>
    <rect x="119" y="199" width="2" height="2" transform="rotate(45 120 200)"/>
    <rect x="199" y="199" width="2" height="2" transform="rotate(45 200 200)"/>
    <rect x="279" y="199" width="2" height="2" transform="rotate(45 280 200)"/>
    <rect x="359" y="199" width="2" height="2" transform="rotate(45 360 200)"/>

    <rect x="39"  y="279" width="2" height="2" transform="rotate(45 40 280)"/>
    <rect x="119" y="279" width="2" height="2" transform="rotate(45 120 280)"/>
    <rect x="199" y="279" width="2" height="2" transform="rotate(45 200 280)"/>
    <rect x="279" y="279" width="2" height="2" transform="rotate(45 280 280)"/>
    <rect x="359" y="279" width="2" height="2" transform="rotate(45 360 280)"/>

    <rect x="39"  y="359" width="2" height="2" transform="rotate(45 40 360)"/>
    <rect x="119" y="359" width="2" height="2" transform="rotate(45 120 360)"/>
    <rect x="199" y="359" width="2" height="2" transform="rotate(45 200 360)"/>
    <rect x="279" y="359" width="2" height="2" transform="rotate(45 280 360)"/>
    <rect x="359" y="359" width="2" height="2" transform="rotate(45 360 360)"/>
  </g>
</svg>
